<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>家事RPG</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="celebrationContainer" class="celebration-container"></div>
    <div id="completionModal" class="modal">
      <div class="modal-content">
        <div class="modal-icon">🎉</div>
        <h2 id="modalTitle">完了しました！</h2>
        <p id="modalMessage"></p>
        <button id="modalCloseBtn" class="modal-btn">OK</button>
      </div>
    </div>
    <main class="app-shell">
      <section class="hero">
        <div>
          <h1>家事RPG</h1>
          <p>家事を選んで実行し、経験値を貯めてレベルアップ報酬をゲットしよう。</p>
        </div>
        <div class="status-card">
          <div class="level">レベル <span id="levelValue">1</span></div>
          <div class="xp-bar">
            <div id="xpFill" class="xp-fill"></div>
          </div>
          <div class="xp-text"><span id="xpValue">0</span> / <span id="nextLevelXp">100</span> XP</div>
          <div class="reward-text" id="nextReward">次のレベル報酬: <span>好きなデザート</span></div>
          <div class="reward-notice" id="rewardNotice" aria-live="polite"></div>
        </div>
      </section>

      <section class="task-library">
        <h2>家事を選ぶ</h2>
        <p class="library-note">実施した家事を選択すると、こちらで設定した経験値が獲得できます。</p>
        <ul id="taskItems" class="tasks"></ul>
      </section>

      <section class="history-list">
        <div class="section-header">
          <h2>実施済み家事</h2>
          <div class="button-group">
            <button id="clearAll">履歴を消す</button>
            <button id="resetAll" class="danger-button">全データリセット</button>
          </div>
        </div>
        <ul id="historyItems" class="quests"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
